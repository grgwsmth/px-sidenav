<div class="wrapper">
	<h1>PX Sidenav</h1>
	<div class="divider-dark"></div>

	<div class="container" id="reference">
		<button class="button-secondary" id="add-parent" aria-label="Add new parent link">Add parent link</button>
	</div>

	<div id="navigation-container" role="tree" aria-label="Navigation structure">
		<!-- Dynamic content shows up here -->
	</div>

	<!-- Post action -->
	<div class="container">
		<button class="button-primary" id="submit-post" aria-label="Create navigation structure">Run plugin</button>
	</div>
</div>

<script>
	/**
	 * Core State Management
	 * 
	 * This state object manages all data and UI state for the plugin.
	 * It uses Maps to store parent and child data, track errors, and manage loading states.
	 * Each parent in the parents Map contains its own children Map.
	 */
	const state = {
		parents: new Map(),
		parentCounter: 0,
		isLoading: false,
		errors: new Map(),

		/**
		 * Generates and returns the next available parent ID.
		 * Used to ensure unique IDs for new parent elements.
		 */
		getNextParentId() {
			this.parentCounter++;
			return this.parentCounter;
		},

		/**
		 * Adds a new parent to the state with an empty children Map.
		 * 
		 * @param {number} parentId - The unique ID for the parent
		 * @param {Object} data - The parent's data (label, etc.)
		 */
		addParent(parentId, data) {
			this.parents.set(parentId, { ...data, children: new Map() });
		},

		/**
		 * Removes a parent and all its children from the state.
		 * 
		 * @param {number} parentId - The ID of the parent to remove
		 */
		removeParent(parentId) {
			this.parents.delete(parentId);
		},

		/**
		 * Adds a child to a specific parent in the state.
		 * 
		 * @param {number} parentId - The parent's ID
		 * @param {number} childId - The child's ID
		 * @param {Object} data - The child's data (label, etc.)
		 */
		addChild(parentId, childId, data) {
			const parent = this.parents.get(parentId);
			if (parent) {
				parent.children.set(childId, data);
			}
		},

		/**
		 * Retrieves a parent's data from the state
		 * @param {number} parentId - The ID of the parent to retrieve
		 */
		getParentData(parentId) {
			return this.parents.get(parentId);
		},

		/**
		 * Formats all state data for submission to Figma
		 * Converts the Maps into a nested array structure that Figma expects
		 */
		getAllData() {
			return {
				parents: Array.from(this.parents.entries()).map(([id, data]) => ({
					id: `parent-link-label-${id}`,
					label: data.label,
					children: Array.from(data.children.entries()).map(([childId, childData]) => ({
						id: `child-link-label-${id}-${childId}`,
						label: childData.label
					}))
				}))
			};
		},

		/**
		 * Manages loading state and updates UI accordingly
		 * Disables buttons and shows loading spinner when active
		 */
		setLoading(loading) {
			this.isLoading = loading;
			elements.submitButton.classList.toggle('loading', loading);
			elements.submitButton.disabled = loading;
		},

		/**
		 * Adds an error message to an input field
		 * Updates UI to show error state and message
		 */
		addError(elementId, message) {
			this.errors.set(elementId, message);
			const element = document.getElementById(elementId);
			if (element) {
				element.classList.add('error');
				const errorElement = element.nextElementSibling;
				if (errorElement?.classList.contains('error-text')) {
					errorElement.textContent = message;
				}
			}
		},

		/**
		 * Removes error state from an input field
		 * Cleans up error UI elements
		 */
		removeError(elementId) {
			this.errors.delete(elementId);
			const element = document.getElementById(elementId);
			if (element) {
				element.classList.remove('error');
				const errorElement = element.nextElementSibling;
				if (errorElement?.classList.contains('error-text')) {
					errorElement.textContent = '';
				}
			}
		},

		/**
		 * Validates all inputs in the form
		 * Checks for required fields and adds error messages where needed
		 * Returns true if all inputs are valid, false otherwise
		 */
		validate() {
			let isValid = true;
			this.errors.clear();

			this.parents.forEach((parent, parentId) => {
				const parentInputId = `parent-link-label-${parentId}`;
				if (!parent.label.trim()) {
					this.addError(parentInputId, 'Parent label is required');
					isValid = false;
				}

				parent.children.forEach((child, childId) => {
					const childInputId = `child-link-label-${parentId}-${childId}`;
					if (!child.label.trim()) {
						this.addError(childInputId, 'Child label is required');
						isValid = false;
					}
				});
			});

			return isValid;
		},

		/**
		 * Renumbers all parents after a removal
		 * Updates IDs and UI elements to maintain sequential numbering
		 */
		renumberParents() {
			let newCounter = 0;
			const oldToNewIds = new Map();
			
			// Create mapping of old to new IDs
			this.parents.forEach((_, oldId) => {
				newCounter++;
				oldToNewIds.set(oldId, newCounter);
			});

			// Create new Map with updated IDs
			const newParents = new Map();
			this.parents.forEach((parentData, oldId) => {
				const newId = oldToNewIds.get(oldId);
				newParents.set(newId, parentData);
			});

			this.parents = newParents;
			this.parentCounter = newCounter;

			// Update DOM elements
			oldToNewIds.forEach((newId, oldId) => {
				const parentContainer = document.getElementById(`parent-container-${oldId}`);
				if (parentContainer) {
					// Update container
					parentContainer.id = `parent-container-${newId}`;
					parentContainer.dataset.parent = newId;

					// Update reference div
					const reference = parentContainer.querySelector(`#parent-reference-${oldId}`);
					if (reference) {
						reference.id = `parent-reference-${newId}`;
					}

					// Update label and input
					const label = parentContainer.querySelector(`label[for="parent-link-label-${oldId}"]`);
					const input = parentContainer.querySelector(`#parent-link-label-${oldId}`);
					if (label) {
						label.setAttribute('for', `parent-link-label-${newId}`);
						label.textContent = `Parent link label ${newId}`;
					}
					if (input) {
						input.id = `parent-link-label-${newId}`;
					}

					// Update buttons
					const addChildBtn = parentContainer.querySelector('.add-child-button');
					const removeParentBtn = parentContainer.querySelector('.remove-parent-button');
					if (addChildBtn) addChildBtn.dataset.parent = newId;
					if (removeParentBtn) removeParentBtn.dataset.parent = newId;

					// Update children container
					const childrenContainer = parentContainer.querySelector(`#children-container-${oldId}`);
					if (childrenContainer) {
						childrenContainer.id = `children-container-${newId}`;
						
						// Update child references
						const children = childrenContainer.querySelectorAll('.container');
						children.forEach(child => {
							const childId = child.dataset.child;
							child.id = `child-reference-${newId}-${childId}`;
							
							const childLabel = child.querySelector(`label[for="child-link-label-${oldId}-${childId}"]`);
							const childInput = child.querySelector(`#child-link-label-${oldId}-${childId}`);
							const removeChildBtn = child.querySelector('.remove-child-button');
							
							if (childLabel) {
								childLabel.setAttribute('for', `child-link-label-${newId}-${childId}`);
							}
							if (childInput) {
								childInput.id = `child-link-label-${newId}-${childId}`;
							}
							if (removeChildBtn) {
								removeChildBtn.dataset.parent = newId;
							}
						});
					}
				}
			});
		}
	};

	/**
	 * DOM Element Cache
	 * 
	 * Stores frequently accessed DOM elements to avoid repeated querySelector calls
	 * Improves performance by reducing DOM queries
	 */
	const elements = {
		navigationContainer: document.getElementById('navigation-container'),
		addParentButton: document.getElementById('add-parent'),
		submitButton: document.getElementById('submit-post')
	};

	/**
	 * Safe DOM Manipulation Utilities
	 * 
	 * Provides error-handled versions of common DOM operations
	 * Helps prevent crashes from failed DOM operations
	 */
	const safeDOM = {
		createElement(tag, options = {}) {
			try {
				const element = document.createElement(tag);
				Object.entries(options).forEach(([key, value]) => {
					if (key === 'classList') {
						element.classList.add(...value);
					} else if (key === 'dataset') {
						Object.entries(value).forEach(([dataKey, dataValue]) => {
							element.dataset[dataKey] = dataValue;
						});
					} else {
						element[key] = value;
					}
				});
				return element;
			} catch (error) {
				console.error(`Error creating ${tag} element:`, error);
				return null;
			}
		},

		getElementById(id) {
			const element = document.getElementById(id);
			if (!element) {
				console.warn(`Element with id "${id}" not found`);
			}
			return element;
		}
	};

	/**
	 * Event Delegation Handler
	 * 
	 * Manages all click events for the navigation container
	 * Uses event delegation to handle dynamically added elements
	 * Improves performance by using a single event listener
	 */
	elements.navigationContainer.addEventListener('click', (event) => {
		const target = event.target;
		
		if (target.matches('.add-child-button')) {
			const parentId = parseInt(target.dataset.parent, 10);
			addChild(parentId);
		}
		
		if (target.matches('.remove-parent-button')) {
			const parentId = parseInt(target.dataset.parent, 10);
			removeParent(parentId);
		}
		
		if (target.matches('.remove-child-button')) {
			const parentId = parseInt(target.closest('.container-field').dataset.parent, 10);
			const childId = parseInt(target.dataset.child, 10);
			removeChild(parentId, childId);
		}
	});

	/**
	 * Debounce Utility
	 * 
	 * Creates a debounced version of a function.
	 * Prevents rapid-fire execution of expensive operations.
	 * 
	 * @type {Function}
	 * @param {Function} fn - The function to debounce
	 * @param {number} delay - Delay in milliseconds
	 * @returns {Function} - Debounced function
	 */
	const debounce = (fn, delay) => {
		let timeoutId;
		return (...args) => {
			clearTimeout(timeoutId);
			timeoutId = setTimeout(() => fn(...args), delay);
		};
	};

	/**
	 * Input Change Handler
	 */
	elements.navigationContainer.addEventListener('input', debounce((event) => {
		const target = event.target;
		const value = target.value.trim();

		if (target.matches('.parent-input')) {
			const parentId = parseInt(target.closest('.container-field').dataset.parent, 10);
			updateParentData(parentId, value);
			
			// Handle error state
			if (!value) {
				state.addError(target.id, 'Parent label is required');
			} else {
				state.removeError(target.id);
			}
		}

		if (target.matches('.child-input')) {
			const parentId = parseInt(target.closest('.container-field').dataset.parent, 10);
			const childId = parseInt(target.closest('.container').dataset.child, 10);
			updateChildData(parentId, childId, value);
			
			// Handle error state
			if (!value) {
				state.addError(target.id, 'Child label is required');
			} else {
				state.removeError(target.id);
			}
		}
	}, 300));

	/**
	 * Add Parent Button Handler
	 * 
	 * Initializes the click handler for adding new parents
	 */
	elements.addParentButton.addEventListener('click', addParent);

	/**
	 * Submit Handler
	 */
	elements.submitButton.addEventListener('click', async () => {
		// Clear any existing errors before validation
		state.errors.clear();
		
		let isValid = true;
		
		// Validate all inputs
		state.parents.forEach((parent, parentId) => {
			const parentInputId = `parent-link-label-${parentId}`;
			const parentInput = document.getElementById(parentInputId);
			
			if (!parentInput?.value.trim()) {
				state.addError(parentInputId, 'Parent label is required');
				isValid = false;
			}

			parent.children.forEach((child, childId) => {
				const childInputId = `child-link-label-${parentId}-${childId}`;
				const childInput = document.getElementById(childInputId);
				
				if (!childInput?.value.trim()) {
					state.addError(childInputId, 'Child label is required');
					isValid = false;
				}
			});
		});

		if (!isValid) {
			return;
		}

		try {
			state.setLoading(true);
			
			// Update state with current input values before sending
			state.parents.forEach((parent, parentId) => {
				const parentInput = document.getElementById(`parent-link-label-${parentId}`);
				if (parentInput) {
					parent.label = parentInput.value.trim();
				}

				parent.children.forEach((child, childId) => {
					const childInput = document.getElementById(`child-link-label-${parentId}-${childId}`);
					if (childInput) {
						child.label = childInput.value.trim();
					}
				});
			});

			parent.postMessage({
				pluginMessage: {
					type: 'create-nav',
					data: state.getAllData()
				}
			}, '*');
		} catch (error) {
			console.error('Error submitting navigation data:', error);
		} finally {
			state.setLoading(false);
		}
	});

	/**
	 * Add Parent Function
	 * 
	 * Creates a new parent element with all necessary structure
	 * Updates state and notifies Figma of the new parent
	 */
	function addParent() {
		const parentId = state.getNextParentId();
		
		const parentElement = document.createElement('div');
		parentElement.classList.add('container-field', 'fade-in');
		parentElement.dataset.parent = parentId;
		parentElement.id = `parent-container-${parentId}`;
		
		parentElement.innerHTML = `
			<div class="flex-container" id="parent-reference-${parentId}">
				<div class="input-container">
					<label class="p-label" for="parent-link-label-${parentId}">Parent link label ${parentId}</label>
					<input class="p-input parent-input" type="text" placeholder="Link label" 
						id="parent-link-label-${parentId}" 
						aria-label="Parent link label ${parentId}"
						required />
					<div class="error-text"></div>
				</div>
				<button class="button-add add-child-button" data-parent="${parentId}" 
					aria-label="Add child link to parent ${parentId}">Add child link</button>
				<button class="button-remove remove-parent-button" data-parent="${parentId}"
					aria-label="Remove parent ${parentId}">Remove</button>
			</div>
			<div class="children-container" id="children-container-${parentId}" 
				role="group" aria-label="Children of parent ${parentId}"></div>
		`;

		elements.navigationContainer.appendChild(parentElement);
		requestAnimationFrame(() => parentElement.classList.add('show'));

		state.addParent(parentId, { label: '' });
		window.parent.postMessage({ pluginMessage: { type: 'add-parent' } }, '*');
	}

	/**
	 * Add Child Function
	 * 
	 * Creates a new child element under specified parent
	 * Updates state and notifies Figma of the new child
	 * @param {number} parentId - The ID of the parent to add child to
	 */
	function addChild(parentId) {
		const parent = state.getParentData(parentId);
		if (!parent) return;

		const childId = parent.children.size + 1;
		const childrenContainer = document.getElementById(`children-container-${parentId}`);
		if (!childrenContainer) return;

		const childElement = document.createElement('div');
		childElement.classList.add('container', 'fade-in');
		childElement.dataset.child = childId;
		childElement.id = `child-reference-${parentId}-${childId}`;
		
		childElement.innerHTML = `
			<div class="flex-container">
				<svg xmlns="http://www.w3.org/2000/svg" width="28" height="35" fill="none" aria-hidden="true">
					<path fill="#fff" d="M0 0h28v35H0V0Z" style="fill: #fff; fill-opacity: 1" />
					<path
						fill="#2E2F32"
						d="M2 3a1 1 0 0 0-2 0v22a1 1 0 0 0 1 1h19.586l-5.293 5.293a1 1 0 0 0-.116 1.276l.116.138a1 1 0 0 0 1.276.116l.138-.116 7-7A.997.997 0 0 0 24 25v-.043a.997.997 0 0 0-.293-.664l-7-7a1 1 0 0 0-1.53 1.276l.116.138L20.586 24H2V3Z"
						style="fill: #2e2f32; fill: color(display-p3 0.1804 0.1843 0.1961); fill-opacity: 1"
					/>
				</svg>
				<div class="input-container">
					<label class="p-label" for="child-link-label-${parentId}-${childId}">Child link label ${childId}</label>
					<input class="p-input child-input" type="text" placeholder="Link label" 
						id="child-link-label-${parentId}-${childId}"
						aria-label="Child link label ${childId} for parent ${parentId}"
						required />
					<div class="error-text"></div>
				</div>
				<button class="button-remove remove-child-button" 
					data-parent="${parentId}" 
					data-child="${childId}"
					aria-label="Remove child ${childId} from parent ${parentId}">Remove</button>
			</div>
			`;

		childrenContainer.appendChild(childElement);
		requestAnimationFrame(() => childElement.classList.add('show'));

		state.addChild(parentId, childId, { label: '' });
		window.parent.postMessage({
			pluginMessage: {
				type: 'add-child',
				parentId: parentId,
				childId: childId
			}
		}, '*');
	}

	/**
	 * Remove Parent Function
	 * 
	 * Removes a parent element and all its children
	 * Animates the removal and updates state
	 * @param {number} parentId - The ID of the parent to remove
	 */
	function removeParent(parentId) {
		const parentElement = document.getElementById(`parent-container-${parentId}`);
		if (!parentElement) return;

		parentElement.classList.remove('show');
		parentElement.addEventListener('transitionend', () => {
			parentElement.remove();
			// Update state
			state.removeParent(parentId);
			// Renumber remaining parents
			state.renumberParents();
			// Notify plugin
			window.parent.postMessage({
				pluginMessage: {
					type: 'remove-parent',
					parentId: parentId
				}
			}, '*');
		});
	}

	/**
	 * Remove Child Function
	 * 
	 * Removes a child element from its parent
	 * Animates the removal and updates state
	 * @param {number} parentId - The parent's ID
	 * @param {number} childId - The child's ID to remove
	 */
	function removeChild(parentId, childId) {
		const childElement = document.getElementById(`child-reference-${parentId}-${childId}`);
		if (!childElement) return;

		childElement.classList.remove('show');
		childElement.addEventListener('transitionend', () => {
			childElement.remove();
			
			// Update state
			const parent = state.getParentData(parentId);
			if (parent) {
				parent.children.delete(childId);
			}

			// Renumber remaining children
			renumberChildren(parentId);

			// Notify plugin
			window.parent.postMessage({
				pluginMessage: {
					type: 'remove-child',
					parentId: parentId,
					childId: childId
				}
			}, '*');
		});
	}

	/**
	 * Renumber Children Function
	 * 
	 * Updates child numbering after a child is removed
	 * Ensures consistent numbering in the UI and state
	 * @param {number} parentId - The parent whose children need renumbering
	 */
	function renumberChildren(parentId) {
		const childrenContainer = document.getElementById(`children-container-${parentId}`);
		if (!childrenContainer) return;

		const parent = state.getParentData(parentId);
		if (!parent) return;

		// Create new Map for reordered children
		const newChildren = new Map();
		let newCounter = 0;

		// Get all child elements in DOM order
		const children = childrenContainer.querySelectorAll('.container');
		children.forEach((child) => {
			const oldChildId = parseInt(child.dataset.child, 10);
			const oldChildData = parent.children.get(oldChildId);
			newCounter++;

			// Update DOM elements
			child.dataset.child = newCounter;
			child.id = `child-reference-${parentId}-${newCounter}`;
			
			const label = child.querySelector('.p-label');
			const input = child.querySelector('.child-input');
			const removeButton = child.querySelector('.remove-child-button');
			
			if (label) {
				label.setAttribute('for', `child-link-label-${parentId}-${newCounter}`);
				label.textContent = `Child link label ${newCounter}`;
			}
			
			if (input) {
				input.id = `child-link-label-${parentId}-${newCounter}`;
			}
			
			if (removeButton) {
				removeButton.dataset.child = newCounter;
			}

			// Update state
			if (oldChildData) {
				newChildren.set(newCounter, oldChildData);
			}
		});

		// Update parent's children Map with reordered children
		parent.children = newChildren;
	}

	/**
	 * Update Parent Data Function
	 */
	function updateParentData(parentId, value) {
		const parent = state.getParentData(parentId);
		if (parent) {
			parent.label = value;
		}
	}

	/**
	 * Update Child Data Function
	 */
	function updateChildData(parentId, childId, value) {
		const parent = state.getParentData(parentId);
		if (parent) {
			const child = parent.children.get(childId);
			if (child) {
				child.label = value;
			}
		}
	}
</script>
