	/*
	Create arrays:
	myParents: For the parent elements we add/remove
	myChildren: For the child elements we add/remove
	parentsNum: Attach a number to the parent field group name,
	(and the field inside it) name every time we add one
	*/
	let myParents = [];
	let myChildren = [];
	let parentsNum = 0;
	let childrenNum = 0;
	let parentReference;

	// Add parent fields to the ui: click event
	const addParent = document.getElementById("add-parent");
	addParent.addEventListener("click", () => {
		createParent();
	});

	/*
	Add parent fields to the ui
	This function will:
	1. Increment the parent node variable.
		This will help keep track of how many parents & children we have,
		as we go. We will attach that value to IDs, to keep them organized.
	1. Crate a parent node.
		Parent node contains buttons to:
		a) Add a child node
		b) Delete this parent node
	2. Push the ID of the text field (where user will enter a string),
		to an array, so we can assign the text field values later, as labels in Figma.
	*/
	function createParent() {
		// Increment the variable assigned to the parents as they're added
		parentsNum++;
		// Create the new dom element for a parent field group.
		// It includes a button to add child links, and a button to remove this parent.
		let newElement = document.createElement("div");
		newElement.classList.add("container-field");
		newElement.id = "parent-container-" + parentsNum;
		newElement.innerHTML = `
			<div class="flex-container" id="parent-reference-${parentsNum}">
				<div class="input-container">
					<label class="p-label" for="parent-link-label-${parentsNum}">Parent link label ${parentsNum}</label>
					<input class="p-input" type="text" placeholder="Link label" id="parent-link-label-${parentsNum}" />
				</div>
				<button class="button-add add-child-button" id="add-child-${parentsNum}" onclick="addChild(event, parentsNum)">
					Add child link
				</button>
				<button class="button-remove" id="remove-parent-${parentsNum}" onclick="removeParent(event)">Remove</button>
			</div>
			`;
		// Add to the array as we add fields to the ui
		myParents.push("parent-link-label-" + parentsNum);
		// Add the new parent under the button container.
		let parentReference = addParent.parentNode;
		// Add animate class to the new element
		newElement.classList.add("fade-in");
		// Insert the new element after the reference element
		parentReference.after(newElement);
		// Show it (with animation)
		setTimeout(() => {
			newElement.classList.add("show");
		}, 10);
		// Check the arrays
		console.log("Parents: " + myParents);
		console.log("Children: " + myChildren);
	}
